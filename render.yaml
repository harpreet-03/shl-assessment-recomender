services:
  - type: web
    name: shl-assessment-recommender
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
